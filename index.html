<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Да кто такой этот ваш Иван Усков</title>
    <link href="styles/style.css" rel="stylesheet">
    <link href="images/favicon.ico" rel="icon">
</head>
<body>
    <div class="block" id="head">
        <p>Выполнил: студент Чайкин Вадим Константинович</p>
        <p>Группа P3215</p>
        <p>Вариант №42069</p>
        <h1>Лабораторная работа №<a href="https://ru.wikipedia.org/wiki/%D0%9E%D0%B4%D0%B8%D0%BD" title="Один">1</a>
            по дисциплине &laquo;Веб-программирование&raquo;</h1>
    </div>
    <div class="block">
        <table id="not-okay">
            <tr>
                <td width="50%">
                    <img src="images/graph.png" style="mix-blend-mode: screen" id="okay">
                    <p>Введите координаты X, Y и радиус R:</p>
                    <form>
                        <label>
                            X: <select name="x">
                            <option>-4</option>
                            <option>-3</option>
                            <option>-2</option>
                            <option>-1</option>
                            <option>0</option>
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                        </select>
                        </label>
                        <br/>
                        <label>
                            Y: <input name="y">
                        </label>
                        <br/>
                        <label>
                            R: <select name="r">
                            <option>1</option>
                            <option>1.5</option>
                            <option>2</option>
                            <option>2.5</option>
                            <option>3</option>
                        </select>
                        </label>
                        <br/>
                        <label>
                            <button type="submit" name="submit" id="submit">sus</button>
                        </label>
                    </form>
                </td>
                <td>
                </td>
            </tr>
        </table>
    </div>
    <div class="block">
        placeholder text
    </div>
</body>
</html>
